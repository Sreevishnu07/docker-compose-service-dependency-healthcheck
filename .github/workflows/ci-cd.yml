name: Full CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        ports:
          - "3306:3306"
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.ROOT_PASSWORD }}
          MYSQL_DATABASE: my_db

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: "3.9"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install MySqlClient
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySql
        env:
          DB_PASSWORD: ${{ secrets.ROOT_PASSWORD }}
        run: |
          for i in {1..10}; do
            if mysqladmin ping -h 127.0.0.1 -p"$DB_PASSWORD" --silent; then
              echo "MySql ready"
              exit 0
            fi
            echo "Waiting for backend.."
            sleep 2
          done
          echo "MySql failed"
          exit 1

      - name: Start backend and test api
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root 
          DB_PASSWORD: ${{ secrets.ROOT_PASSWORD }}
          DB_NAME: my_db
        run: |
          python backend/app.py &
          for i in {1..10}; do
            if curl -f http://127.0.0.1:5000/api/data; then
              echo "API Working"
              exit 0
            fi
          sleep 2
          done
          echo "Backend failed"
          exit 1

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Image tag
        id: vars
        run: echo "TAG=$(date +%s)">>$GITHUB_OUTPUT

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/backend:${{steps.vars.outputs.TAG}} ./backend 

      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{steps.vars.outputs.TAG}} ./frontend

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{steps.vars.outputs.TAG}}

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{steps.vars.outputs.TAG}}
            
