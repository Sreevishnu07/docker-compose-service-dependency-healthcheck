name: Full CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: my_db
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySQL
        run: |
          for i in {1..10}; do
            if mysqladmin ping -h 127.0.0.1 -proot --silent; then
              echo "MySQL ready"
              exit 0
            fi
            sleep 3
          done
          echo "MySQL failed"
          exit 1

      - name: Start backend and test API
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: my_db
        run: |
          python backend/app.py &

          for i in {1..10}; do
            if curl -f http://localhost:5000/api/data; then
              echo "API working"
              exit 0
            fi
            echo "Waiting for backend..."
            sleep 2
          done

          echo "Backend failed"
          exit 1


  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend
        working-directory: ./frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:1.0 .

      - name: Build backend
        working-directory: ./backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:1.0 .

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend:1.0

      - name: Push backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:1.0
