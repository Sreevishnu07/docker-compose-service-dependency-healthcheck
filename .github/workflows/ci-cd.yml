name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: my_db
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Wait for MySQL
        run: |
          for i in {1..20}; do
            mysqladmin ping -h 127.0.0.1 -proot --silent && break
            echo "Waiting for MySQL..."
            sleep 3
          done

      - name: Test Backend (DB Connection ONLY)
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: my_db
          RUN_SERVER: false
        run: python backend/app.py


  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Frontend Image
        working-directory: ./frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:1.0 .

      - name: Build Backend Image
        working-directory: ./backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:1.0 .

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend:1.0

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:1.0
