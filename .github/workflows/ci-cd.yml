on:
 push:
   branches:
     - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: ${{secrets.ROOT_PASSWORD}}
          MYSQL_DATABASE: ${{secrets.DATABASE}}
        options: >-
          --health-cmd="mysqladmin ping -h localhost -p${{secrets.ROOT_PASSWORD}}"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
  
      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Test Backend
        env:
          DB_HOST: ${{secrets.DB_HOST}}
          DB_USER: ${{secrets.DB_USER}}
          DB_PASSWORD: ${{secrets.DB_PASSWORD}}
          DB_NAME: ${{secrets.DB_NAME}}
        run: |
          python backend/app.py
    
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Frontend Image
        working-directory: ./frontend
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/frontend:1.0 .
 
      - name: Build Backend Image
        working-directory: ./backend
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/backend:1.0 .
  
      - name: Docker login
        run: echo ${{secrets.DOCKER_PASSWORD}} | docker login -u ${{secrets.DOCKER_USERNAME}} --password-stdin
 
      - name: Push frontend image
        run: docker push ${{secrets.DOCKER_USERNAME}}/frontend:1.0

      - name: Push backend image
        run: docker push ${{secrets.DOCKER_USERNAME}}/backend:1.0
      

  

